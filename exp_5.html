<!DOCTYPE html>
<html>
<head>
  <title>Employee Management System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    input, button {
      margin: 5px;
      padding: 8px;
    }
    #output {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>

  <h2>Employee Management System</h2>

  <label>Employee Name:</label>
  <input type="text" id="empName"><br>

  <label>Employee ID:</label>
  <input type="text" id="empId"><br>

  <label>Salary:</label>
  <input type="number" id="empSalary"><br>

  <label>Department:</label>
  <input type="text" id="empDept"><br>

  <button onclick="addEmployee()">Add Employee</button>
  <button onclick="displayEmployees()">Display All Employees</button>
  <button onclick="filterSalary()">Filter Salary > 50000</button>
  <button onclick="totalSalary()">Total Salary Payout</button>
  <button onclick="averageSalary()">Average Salary</button>
  <button onclick="countDepartment()">Count Employees by Department</button>

  <div id="output"></div>

<script src="exp_5.js"></script>

</body>
</html>
