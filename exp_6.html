<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>button with JAVA</title>
    <style>
        h2{
            text-align: center;
            background-color: blanchedalmond;
            color:brown;
        }
    </style>
</head>
<body>
    <div class="maincontainer">

        <h2 id="heading">Welcome to java script web page</h2>
        <input type="text" placeholder="Enter the heading" id="textinput">

        <button id="changeheading" onclick="changehead()">change heading</button>
        <button id="backgroundcolor" onclick="">change background color</button>
        <button id="paragraphsize">change size of paragraph</button>
        <button id="hideparagraph">show/hide paragraph</button>
        <button id="reset">reset</button>
        
        <p>This is a simple paragraph,which is use to demonstrate the java!</p>

    </div>
    
</body>
</html>
